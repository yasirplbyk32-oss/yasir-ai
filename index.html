<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Yasir AI</title>
                <style>
                        * { box-sizing: border-box; }
                                body { font-family: sans-serif; margin: 0; background: #1a1a1a; color: white; height: 100vh; display: flex; flex-direction: column; }
                                        header { background: #121212; padding: 15px; border-bottom: 1px solid #d32f2f; text-align: center; font-weight: bold; font-size: 22px; color: #d32f2f; }
                                                #chat-box { flex: 1; overflow-y: auto; padding: 20px; background: #212121; display: flex; flex-direction: column; gap: 15px; }
                                                        .msg { max-width: 85%; padding: 12px 16px; border-radius: 15px; font-size: 16px; line-height: 1.5; }
                                                                .ai { background: #2a2a2a; align-self: flex-start; border-left: 4px solid #d32f2f; }
                                                                        .user { background: #d32f2f; align-self: flex-end; }
                                                                                .system { background: #333; align-self: center; font-size: 13px; color: #aaa; padding: 5px 15px; border-radius: 10px; }
                                                                                        #input-area { background: #121212; padding: 15px; display: flex; gap: 10px; border-top: 1px solid #333; }
                                                                                                input { flex: 1; padding: 12px; border-radius: 25px; border: 1px solid #444; background: #333; color: white; outline: none; }
                                                                                                        button { padding: 10px 25px; background: #d32f2f; color: white; border: none; border-radius: 25px; cursor: pointer; font-weight: bold; }
                                                                                                                button:active { transform: scale(0.95); background: #b71c1c; }
                                                                                                                    </style>
                                                                                                                    </head>
                                                                                                                    <body>

                                                                                                                        <header>Yasir AI</header>
                                                                                                                            
                                                                                                                                <div id="chat-box">
                                                                                                                                        <div class="msg ai">Merhaba. Ben Yasir AI, gelişmiş bir dil modeliyim. Size nasıl yardımcı olabilirim?</div>
                                                                                                                                            </div>

                                                                                                                                                <div id="input-area">
                                                                                                                                                        <input type="text" id="userInput" placeholder="Bir mesaj yazın..." onkeydown="if(event.key==='Enter') askAI()">
                                                                                                                                                                <button id="sendBtn" onclick="askAI()">Gönder</button>
                                                                                                                                                                    </div>

                                                                                                                                                                        <script>
                                                                                                                                                                                async function askAI() {
                                                                                                                                                                                                const inputField = document.getElementById('userInput');
                                                                                                                                                                                                            const chatBox = document.getElementById('chat-box');
                                                                                                                                                                                                                        const message = inputField.value.trim();

                                                                                                                                                                                                                                    if (!message) return;

                                                                                                                                                                                                                                                // 1. Kullanıcı mesajını yaz
                                                                                                                                                                                                                                                            chatBox.innerHTML += `<div class="msg user">${message}</div>`;
                                                                                                                                                                                                                                                                        inputField.value = "";
                                                                                                                                                                                                                                                                                    chatBox.scrollTop = chatBox.scrollHeight;

                                                                                                                                                                                                                                                                                                const API_KEY = "AIzaSyA6vC0Cl2ZcFVkQymb0Ug3Y0icX3kcbvDE";
                                                                                                                                                                                                                                                                                                            const URL = "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=" + API_KEY;

                                                                                                                                                                                                                                                                                                                        try {
                                                                                                                                                                                                                                                                                                                                            // 2. İnternete bağlanma isteği
                                                                                                                                                                                                                                                                                                                                                            const response = await fetch(URL, {
                                                                                                                                                                                                                                                                                                                                                                                    method: "POST",
                                                                                                                                                                                                                                                                                                                                                                                                        headers: { "Content-Type": "application/json" },
                                                                                                                                                                                                                                                                                                                                                                                                                            body: JSON.stringify({ contents: [{ parts: [{ text: message }] }] })
                                                                                                                                                                                                                                                                                                                                                            });

                                                                                                                                                                                                                                                                                                                                                                            const data = await response.json();
                                                                                                                                                                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                                                                                                                                                                            if (data.candidates && data.candidates[0].content) {
                                                                                                                                                                                                                                                                                                                                                                                                                                    const aiReply = data.candidates[0].content.parts[0].text;
                                                                                                                                                                                                                                                                                                                                                                                                                                                        chatBox.innerHTML += `<div class="msg ai">${aiReply}</div>`;
                                                                                                                                                                                                                                                                                                                                                                                                            } else {
                                                                                                                                                                                                                                                                                                                                                                                                                                    throw new Error();
                                                                                                                                                                                                                                                                                                                                                                                                            }
                                                                                                                                                                                                                                                                                                                        } catch (error) {
                                                                                                                                                                                                                                                                                                                                            // 3. Hata mesajı (Gerçek AI tarzı)
                                                                                                                                                                                                                                                                                                                                                            chatBox.innerHTML += `<div class="system">Bağlantı hatası: Sunucuya erişilemiyor. Lütfen internetinizi kontrol edin.</div>`;
                                                                                                                                                                                                                                                                                                                        }
                                                                                                                                                                                                                                                                                                                                    chatBox.scrollTop = chatBox.scrollHeight;
                                                                                                                                                                                }
                                                                                                                                                                                    </script>
                                                                                                                                                                                    </body>
                                                                                                                                                                                    </html>
