<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yasir AI</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background-color: #1a1a1a; color: #ececec; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        header { background-color: #121212; padding: 18px; border-bottom: 2px solid #d32f2f; text-align: center; font-weight: bold; font-size: 22px; color: #d32f2f; text-transform: uppercase; letter-spacing: 2px; }
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; background-color: #212121; display: flex; flex-direction: column; gap: 15px; scroll-behavior: smooth; }
        .msg { max-width: 85%; padding: 14px 18px; border-radius: 18px; font-size: 16px; line-height: 1.5; }
        .ai { background-color: #2a2a2a; align-self: flex-start; border-bottom-left-radius: 4px; border-left: 4px solid #d32f2f; }
        .user { background-color: #d32f2f; align-self: flex-end; border-bottom-right-radius: 4px; color: white; }
        .system { background-color: #333; align-self: center; border-radius: 10px; font-size: 13px; color: #ff9999; padding: 10px; border: 1px solid #444; width: 90%; text-align: center; }
        #input-area { background-color: #121212; padding: 15px; display: flex; gap: 10px; border-top: 1px solid #333; }
        input { flex: 1; padding: 14px; border-radius: 25px; border: 1px solid #444; background-color: #333; color: white; outline: none; font-size: 16px; }
        #sendBtn { padding: 12px 25px; background-color: #d32f2f; color: white; border: none; border-radius: 25px; cursor: pointer; font-weight: bold; font-size: 16px; }
    </style>
</head>
<body>

    <header>Yasir AI</header>
    
    <div id="chat-box">
        <div class="msg ai">Sistem online, Yasir ağa! Yeni anahtar yüklendi. Şimdi bana istediğini sorabilirsin.</div>
    </div>

    <div id="input-area">
        <input type="text" id="userInput" placeholder="Bir mesaj yazın..." onkeydown="if(event.key==='Enter') askAI()">
        <button id="sendBtn" onclick="askAI()">Gönder</button>
    </div>

    <script>
        async function askAI() {
            const inputField = document.getElementById('userInput');
            const chatBox = document.getElementById('chat-box');
            const message = inputField.value.trim();

            if (!message) return;

            chatBox.innerHTML += `<div class="msg user">${message}</div>`;
            inputField.value = "";
            chatBox.scrollTop = chatBox.scrollHeight;

            // Senin taze taze getirdiğin API Key
            const API_KEY = "AIzaSyBRwiD0IIVDkuxyUwBL2Pue2SnC5gnQYhw";
            const URL = "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=" + API_KEY;

            try {
                const response = await fetch(URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ contents: [{ parts: [{ text: message }] }] })
                });

                const data = await response.json();
                
                if (data.error) {
                    chatBox.innerHTML += `<div class="system">Google Yanıtı: ${data.error.message}</div>`;
                } else if (data.candidates && data.candidates[0].content) {
                    const aiReply = data.candidates[0].content.parts[0].text;
                    chatBox.innerHTML += `<div class="msg ai">${aiReply}</div>`;
                }
            } catch (error) {
                chatBox.innerHTML += `<div class="system">Bağlantı Hatası: Lütfen internetinizi kontrol edin ve sayfayı yenileyin.</div>`;
            }
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
